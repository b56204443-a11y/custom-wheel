<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>今天吃什么 - 幸运转盘</title>
<style>
:root {
  --bg: #f5f0eb;
  --surface: #ffffff;
  --text: #2c2416;
  --text-secondary: #6b5e4a;
  --border: #e0d6c5;
  --accent: #e8734a;
  --accent-hover: #d15c34;
  --shadow: 0 2px 16px rgba(0,0,0,0.06);
  --radius: 14px;
}
[data-theme="dark"] {
  --bg: #1a1814;
  --surface: #262320;
  --text: #e8e0d0;
  --text-secondary: #9b8e78;
  --border: #3d3528;
  --accent: #f09060;
  --accent-hover: #e8734a;
  --shadow: 0 2px 16px rgba(0,0,0,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; overflow-x: hidden;
  font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text);
  transition: background 0.3s, color 0.3s;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}
.app {
  max-width: 500px; margin: 0 auto; min-height: 100vh;
  display: flex; flex-direction: column; padding: 12px 16px 24px;
}
/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0 12px;
}
.header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.02em; }
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text-secondary); font-size: 1.15rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.icon-btn:active { transform: scale(0.92); background: var(--border); }
/* Wheel Section */
.wheel-section {
  position: relative; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
}
.wheel-wrapper {
  position: relative; width: min(88vw, 400px); height: min(88vw, 400px);
}
.wheel-bg-img {
  position: absolute; inset: 0; border-radius: 50%;
  background-size: cover; background-position: center;
  pointer-events: none; z-index: 0;
}
canvas#wheelCanvas {
  position: relative; z-index: 1;
  width: 100%; height: 100%; border-radius: 50%;
}
.pointer {
  position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
  z-index: 10; width: 0; height: 0;
  border-left: 16px solid transparent; border-right: 16px solid transparent;
  border-top: 34px solid var(--accent);
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
  pointer-events: none;
}
.spin-btn {
  margin-top: 20px; width: 140px; height: 48px;
  border-radius: 24px; border: none;
  background: var(--accent); color: #fff;
  font-size: 1.1rem; font-weight: 700; letter-spacing: 0.06em;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(232,115,74,0.35);
}
.spin-btn:active { transform: scale(0.95); }
.spin-btn:disabled { opacity: 0.5; pointer-events: none; }
/* Panel Toggle */
.panel-toggle {
  margin: 14px auto 0; padding: 6px 16px;
  border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-secondary);
  font-size: 0.85rem; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.2s;
}
.panel-toggle:active { background: var(--border); }
.panel-toggle .arrow { transition: transform 0.3s; font-size: 0.7rem; }
.panel-toggle.open .arrow { transform: rotate(180deg); }
/* Panel */
.panel {
  flex: 1; overflow: hidden; margin-top: 14px;
  background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow); border: 1px solid var(--border);
  display: flex; flex-direction: column;
  max-height: 0; opacity: 0; transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.3s ease;
  padding: 0 16px;
}
.panel.open { max-height: 600px; opacity: 1; padding: 16px; overflow-y: auto; }
.panel h3 { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 10px; }
/* Option List */
.option-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.option-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 10px;
  background: var(--bg); border: 1px solid var(--border);
  transition: all 0.2s;
}
.option-color {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid rgba(0,0,0,0.1); cursor: pointer;
}
.option-name {
  flex: 1; min-width: 0; font-size: 0.92rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.option-weight {
  width: 52px; flex-shrink: 0;
}
.option-weight input {
  width: 100%; padding: 4px 6px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 0.82rem; text-align: center;
}
.option-del {
  width: 30px; height: 30px; border-radius: 50%; border: none;
  background: transparent; color: #c44; font-size: 1rem;
  cursor: pointer; flex-shrink: 0; transition: all 0.2s;
}
.option-del:active { background: #fee; }
/* Add Row */
.add-row {
  display: flex; gap: 8px; margin-top: 10px;
}
.add-row input {
  flex: 1; padding: 10px 14px; border-radius: 10px;
  border: 1.5px dashed var(--border); background: var(--bg);
  color: var(--text); font-size: 0.92rem; outline: none;
  transition: border-color 0.2s;
}
.add-row input:focus { border-color: var(--accent); border-style: solid; }
.add-row button {
  padding: 10px 18px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff; font-weight: 600;
  font-size: 0.92rem; cursor: pointer; white-space: nowrap;
  transition: all 0.2s;
}
.add-row button:active { transform: scale(0.95); }
/* BG Image Controls */
.bg-controls { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.bg-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.bg-row label { font-size: 0.82rem; color: var(--text-secondary); width: 56px; flex-shrink: 0; }
.bg-row input[type="range"] { flex: 1; accent-color: var(--accent); }
.bg-row .file-wrap {
  position: relative; display: inline-flex;
}
.bg-row input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
  font-size: 0; color: transparent;
}
.bg-row .file-btn {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); font-size: 0.82rem; cursor: pointer;
  color: var(--text-secondary);
}
.bg-row button {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); font-size: 0.82rem; cursor: pointer;
  color: #c44;
}
/* History */
.history-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.history-list { list-style: none; display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
.history-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  border-radius: 8px; background: var(--bg); font-size: 0.85rem;
}
.history-item .h-date { color: var(--text-secondary); font-size: 0.78rem; white-space: nowrap; }
.history-item .h-name { flex: 1; font-weight: 600; color: var(--accent); }
.history-item .h-time { color: var(--text-secondary); font-size: 0.78rem; white-space: nowrap; }
.history-empty { color: var(--text-secondary); font-size: 0.85rem; text-align: center; padding: 12px; }
/* Result Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.5); display: flex;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface); border-radius: 20px;
  padding: 32px 28px 24px; text-align: center;
  max-width: 320px; width: 90%;
  box-shadow: 0 16px 48px rgba(0,0,0,0.2);
  transform: scale(0.8); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-overlay.show .modal { transform: scale(1); }
.modal .result-emoji { font-size: 3.5rem; margin-bottom: 8px; animation: bounceIn 0.5s; }
@keyframes bounceIn {
  0% { transform: scale(0); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.modal .result-text { font-size: 1.6rem; font-weight: 700; color: var(--accent); margin: 8px 0 4px; }
.modal .result-sub { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 20px; }
.modal button {
  width: 100%; padding: 12px; border-radius: 12px; border: none;
  background: var(--accent); color: #fff; font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.modal button:active { transform: scale(0.96); }
/* Center dot */
.center-dot {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--surface); border: 3px solid var(--accent);
  z-index: 5; pointer-events: none;
  box-shadow: 0 1px 6px rgba(0,0,0,0.15);
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🍽️ 今天吃什么</h1>
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn" title="切换深色/浅色模式">🌓</button>
    </div>
  </div>

  <div class="wheel-section">
    <div class="wheel-wrapper" id="wheelWrapper">
      <div class="wheel-bg-img" id="wheelBgImg"></div>
      <canvas id="wheelCanvas"></canvas>
      <div class="pointer"></div>
      <div class="center-dot"></div>
    </div>
    <button class="spin-btn" id="spinBtn">🎯 开 转</button>
    <button class="panel-toggle" id="panelToggle">
      <span>管理选项</span><span class="arrow">▾</span>
    </button>
  </div>

  <div class="panel" id="panel">
    <h3>🎨 转盘选项</h3>
    <ul class="option-list" id="optionList"></ul>
    <div class="add-row">
      <input type="text" id="addInput" placeholder="输入新选项，回车添加…" maxlength="12">
      <button id="addBtn">添加</button>
    </div>
    <div class="bg-controls">
      <h3 style="margin-bottom:8px">🖼️ 背景图片</h3>
      <div class="bg-row">
        <label>选择图片</label>
        <span class="file-wrap">
          <button class="file-btn">上传</button>
          <input type="file" id="bgFileInput" accept="image/*">
        </span>
        <button id="bgClearBtn">清除</button>
      </div>
      <div class="bg-row">
        <label>透明度</label>
        <input type="range" id="bgOpacity" min="0" max="100" value="60">
        <span style="font-size:0.8rem;width:36px;text-align:right" id="opacityVal">60%</span>
      </div>
      <div class="bg-row">
        <label>模糊度</label>
        <input type="range" id="bgBlur" min="0" max="20" value="3">
        <span style="font-size:0.8rem;width:36px;text-align:right" id="blurVal">3px</span>
      </div>
    </div>
    <div class="history-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <h3>📋 转动记录</h3>
        <button id="clearHistoryBtn" style="padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:#c44;font-size:0.78rem;cursor:pointer">清空</button>
      </div>
      <ul class="history-list" id="historyList">
        <li class="history-empty">暂无记录，开转吧！</li>
      </ul>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="result-emoji">🎉</div>
    <div class="result-text" id="resultText"></div>
    <div class="result-sub">就是它了，别犹豫！</div>
    <button id="modalClose">好 的</button>
  </div>
</div>

<script>
// ===== State =====
const DEFAULT_OPTIONS = [
  { name: '火锅', weight: 3, color: '#f94144' },
  { name: '麻辣烫', weight: 2, color: '#f8961e' },
  { name: '寿司', weight: 2, color: '#f9c74f' },
  { name: '炸鸡', weight: 2, color: '#90be6d' },
  { name: '拉面', weight: 3, color: '#577590' },
  { name: '披萨', weight: 1, color: '#f9844a' },
  { name: '黄焖鸡', weight: 2, color: '#4d908e' },
  { name: '麻辣香锅', weight: 1, color: '#9c89b8' },
];

const PALETTE = [
  '#f94144','#f8961e','#f9c74f','#90be6d','#577590',
  '#f9844a','#4d908e','#9c89b8','#e0735f','#43aa8b',
  '#f35b04','#7678ed','#3d5a80','#ee6c4d','#52b788',
  '#ffb703','#8ecae6','#bc4742','#6a994e','#b5838d',
];

let options = [];
let bgImageData = null;
let bgImgElement = null; // 预加载的背景图 Image 对象
let bgOpacity = 60;
let bgBlur = 3;
const DEFAULT_BG_PATH = './6e5b1cb38ece27fe82f3f7c2aa33a7d2.jpg';
let spinning = false;
let currentAngle = 0;
let currentTheme = localStorage.getItem('wheel-theme') || 'light';
let history = []; // 转动记录

// ===== DOM refs =====
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const spinBtn = document.getElementById('spinBtn');
const panel = document.getElementById('panel');
const panelToggle = document.getElementById('panelToggle');
const optionList = document.getElementById('optionList');
const addInput = document.getElementById('addInput');
const modalOverlay = document.getElementById('modalOverlay');
const resultText = document.getElementById('resultText');
const wheelBgImg = document.getElementById('wheelBgImg');

// ===== Persistence =====
function saveData() {
  localStorage.setItem('wheel-options', JSON.stringify(options));
  localStorage.setItem('wheel-bgImage', bgImageData || '');
  localStorage.setItem('wheel-bgOpacity', bgOpacity);
  localStorage.setItem('wheel-bgBlur', bgBlur);
  localStorage.setItem('wheel-history', JSON.stringify(history));
}

// 加载默认背景 JPG 为 data URL
async function loadDefaultBg() {
  try {
    const resp = await fetch(DEFAULT_BG_PATH);
    if (!resp.ok) throw new Error('fetch failed');
    const blob = await resp.blob();
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    console.warn('无法加载默认背景图:', e.message);
    return null;
  }
}

function loadData() {
  const saved = localStorage.getItem('wheel-options');
  options = saved ? JSON.parse(saved) : [...DEFAULT_OPTIONS];
  bgImageData = localStorage.getItem('wheel-bgImage') || null;
  const savedOpacity = parseInt(localStorage.getItem('wheel-bgOpacity'));
  bgOpacity = isNaN(savedOpacity) ? 60 : savedOpacity;
  const savedBlur = parseInt(localStorage.getItem('wheel-bgBlur'));
  bgBlur = isNaN(savedBlur) ? 3 : savedBlur;
  const savedHistory = localStorage.getItem('wheel-history');
  history = savedHistory ? JSON.parse(savedHistory) : [];
  // 预加载背景图
  if (bgImageData) {
    bgImgElement = new Image();
    bgImgElement.src = bgImageData;
  }
}

// ===== Theme =====
function applyTheme() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  localStorage.setItem('wheel-theme', currentTheme);
  document.getElementById('themeBtn').textContent = currentTheme === 'dark' ? '☀️' : '🌓';
}
document.getElementById('themeBtn').addEventListener('click', () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme();
  drawWheel();
});

// ===== Drawing =====
function getColor(i) { return options[i]?.color || PALETTE[i % PALETTE.length]; }

function drawWheel() {
  const size = canvas.parentElement.clientWidth;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cx = size / 2, cy = size / 2, r = size / 2 - 4;

  ctx.clearRect(0, 0, size, size);

  // 有背景图时先画到 canvas 上（裁剪为圆形）
  if (bgImgElement && bgImgElement.complete && bgImgElement.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.clip();
    const iw = bgImgElement.naturalWidth, ih = bgImgElement.naturalHeight;
    const imgRatio = iw / ih;
    let dw, dh, dx, dy;
    if (imgRatio > 1) { dh = size; dw = size * imgRatio; dx = -(dw - size) / 2; dy = 0; }
    else { dw = size; dh = size / imgRatio; dx = 0; dy = -(dh - size) / 2; }
    ctx.drawImage(bgImgElement, dx, dy, dw, dh);
    ctx.restore();
  }

  if (options.length === 0) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#e0d6c5'; ctx.fill();
    ctx.fillStyle = '#6b5e4a'; ctx.font = `${size*0.045}px "PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('点击下方添加选项', cx, cy);
    return;
  }

  const totalWeight = options.reduce((s, o) => s + o.weight, 0);
  let startAngle = currentAngle - Math.PI / 2;

  // 有背景图时扇形大幅透明，让背景清晰可见
  const sectorAlpha = bgImageData ? Math.max(0.08, 1 - bgOpacity / 100) : 1;

  options.forEach((opt, i) => {
    const sweep = (opt.weight / totalWeight) * Math.PI * 2;
    const endAngle = startAngle + sweep;

    // Sector
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, startAngle, endAngle);
    ctx.closePath();
    const grad = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, r);
    const baseColor = getColor(i);
    grad.addColorStop(0, lightenColor(baseColor, 0.3));
    grad.addColorStop(1, baseColor);
    ctx.fillStyle = grad;
    if (sectorAlpha < 1) { ctx.save(); ctx.globalAlpha = sectorAlpha; }
    ctx.fill();
    if (sectorAlpha < 1) { ctx.restore(); }
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();

    // Text
    const midAngle = startAngle + sweep / 2;
    const textR = r * 0.62;
    const tx = cx + Math.cos(midAngle) * textR;
    const ty = cy + Math.sin(midAngle) * textR;
    ctx.save(); ctx.translate(tx, ty); ctx.rotate(midAngle + Math.PI / 2);
    ctx.fillStyle = isLightColor(baseColor) ? '#2c2416' : '#fff';
    const fontSize = Math.max(11, Math.min(16, r * 0.095));
    ctx.font = `600 ${fontSize}px "PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const maxW = r * 0.48;
    const txt = truncateText(ctx, opt.name, maxW);
    ctx.fillText(txt, 0, 0);
    ctx.restore();

    startAngle = endAngle;
  });

  // Outer ring (reset alpha)
  ctx.globalAlpha = 1;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 3; ctx.stroke();
}

function truncateText(ctx, text, maxWidth) {
  if (ctx.measureText(text).width <= maxWidth) return text;
  let s = text;
  while (s.length > 1 && ctx.measureText(s + '…').width > maxWidth) s = s.slice(0, -1);
  return s + '…';
}

function lightenColor(hex, amount) {
  const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  const lr = Math.min(255, Math.round(r + (255 - r) * amount));
  const lg = Math.min(255, Math.round(g + (255 - g) * amount));
  const lb = Math.min(255, Math.round(b + (255 - b) * amount));
  return `rgb(${lr},${lg},${lb})`;
}

function isLightColor(hex) {
  const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
  return (r * 299 + g * 587 + b * 114) / 1000 > 150;
}

// ===== BG Image =====
function updateBgImage() {
  if (bgImageData) {
    wheelBgImg.style.backgroundImage = `url(${bgImageData})`;
    wheelBgImg.style.opacity = bgOpacity / 100;
    wheelBgImg.style.filter = `blur(${bgBlur}px)`;
    wheelBgImg.style.display = '';
    // 预加载到 Image 对象供 canvas 绘制
    if (!bgImgElement || bgImgElement.src !== bgImageData) {
      bgImgElement = new Image();
      bgImgElement.src = bgImageData;
    }
  } else {
    wheelBgImg.style.backgroundImage = '';
    wheelBgImg.style.display = 'none';
    bgImgElement = null;
  }
}
document.getElementById('bgOpacity').addEventListener('input', function() {
  bgOpacity = +this.value;
  document.getElementById('opacityVal').textContent = bgOpacity + '%';
  updateBgImage(); drawWheel(); saveData();
});
document.getElementById('bgBlur').addEventListener('input', function() {
  bgBlur = +this.value;
  document.getElementById('blurVal').textContent = bgBlur + 'px';
  updateBgImage(); saveData(); // blur 由 CSS 层处理
});
document.getElementById('bgFileInput').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    bgImageData = reader.result;
    localStorage.setItem('wheel-bgCustom', 'true');
    updateBgImage(); drawWheel(); saveData();
  };
  reader.readAsDataURL(file);
});
document.getElementById('bgClearBtn').addEventListener('click', async () => {
  bgImageData = null;
  bgImgElement = null;
  localStorage.removeItem('wheel-bgCustom');
  document.getElementById('bgFileInput').value = '';
  // 恢复默认背景
  const defaultBg = await loadDefaultBg();
  if (defaultBg) {
    bgImageData = defaultBg;
    bgImgElement = new Image();
    bgImgElement.src = defaultBg;
  }
  updateBgImage(); drawWheel(); saveData();
});

// ===== Panel =====
panelToggle.addEventListener('click', () => {
  panel.classList.toggle('open');
  panelToggle.classList.toggle('open');
});

function renderOptions() {
  optionList.innerHTML = options.map((opt, i) => `
    <li class="option-item">
      <input type="color" class="option-color" value="${opt.color}" data-index="${i}" title="自定义颜色">
      <span class="option-name">${escHtml(opt.name)}</span>
      <span class="option-weight"><input type="number" value="${opt.weight}" min="1" max="10" data-index="${i}" placeholder="权重"></span>
      <button class="option-del" data-index="${i}" title="删除">×</button>
    </li>
  `).join('');
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

optionList.addEventListener('input', (e) => {
  const idx = +e.target.dataset.index;
  if (isNaN(idx)) return;
  if (e.target.type === 'color') {
    options[idx].color = e.target.value;
  } else if (e.target.type === 'number') {
    options[idx].weight = Math.max(1, Math.min(10, +e.target.value || 1));
  }
  saveData(); drawWheel();
  renderOptions(); // refresh to show updated color/weight
});
optionList.addEventListener('click', (e) => {
  const btn = e.target.closest('.option-del');
  if (!btn) return;
  const idx = +btn.dataset.index;
  if (isNaN(idx)) return;
  options.splice(idx, 1);
  saveData(); drawWheel(); renderOptions();
});

document.getElementById('addBtn').addEventListener('click', addOption);
addInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addOption(); });
function addOption() {
  const name = addInput.value.trim();
  if (!name) return;
  const usedColors = new Set(options.map(o => o.color));
  const freeColor = PALETTE.find(c => !usedColors.has(c)) || PALETTE[options.length % PALETTE.length];
  options.push({ name, weight: 2, color: freeColor });
  addInput.value = ''; addInput.focus();
  saveData(); drawWheel(); renderOptions();
  // Scroll to bottom of option list
  optionList.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

// ===== Spinning =====
spinBtn.addEventListener('click', () => {
  if (spinning || options.length === 0) return;
  spinning = true;
  spinBtn.disabled = true;

  // Weight-based random
  const totalWeight = options.reduce((s, o) => s + o.weight, 0);
  let rnd = Math.random() * totalWeight;
  let selectedIdx = 0;
  for (let i = 0; i < options.length; i++) {
    rnd -= options[i].weight;
    if (rnd <= 0) { selectedIdx = i; break; }
  }

  // Calculate target angle so pointer (top) points to the selected sector
  let cumulative = 0;
  for (let i = 0; i < selectedIdx; i++) cumulative += (options[i].weight / totalWeight) * Math.PI * 2;
  const sectorMid = cumulative + (options[selectedIdx].weight / totalWeight) * Math.PI;
  // Pointer is at -PI/2 (top), so we want the sector mid to end up at -PI/2
  const fullSpins = Math.PI * 2 * (5 + Math.floor(Math.random() * 3));
  let targetAngle = fullSpins - sectorMid;
  while (targetAngle <= currentAngle + Math.PI * 2 * 3) targetAngle += Math.PI * 2;

  const startAngle = currentAngle;
  const duration = 4200;
  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    // Easing: cubic deceleration
    const eased = 1 - Math.pow(1 - t, 4);
    currentAngle = startAngle + (targetAngle - startAngle) * eased;
    drawWheel();

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      spinBtn.disabled = false;
      showResult(selectedIdx);
    }
  }
  requestAnimationFrame(animate);
});

function showResult(idx) {
  resultText.textContent = options[idx].name;
  modalOverlay.classList.add('show');
  if (navigator.vibrate) navigator.vibrate([30, 60, 30]);
  // 记录历史
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  history.unshift({
    name: options[idx].name,
    date: `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`,
    time: `${pad(now.getHours())}:${pad(now.getMinutes())}`,
    ts: now.getTime()
  });
  if (history.length > 100) history.length = 100; // 最多 100 条
  saveData();
  renderHistory();
}

modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay || e.target.id === 'modalClose') {
    modalOverlay.classList.remove('show');
  }
});

// ===== History =====
function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = '<li class="history-empty">暂无记录，开转吧！</li>';
    return;
  }
  list.innerHTML = history.map(h => `
    <li class="history-item">
      <span class="h-date">${h.date}</span>
      <span class="h-name">${escHtml(h.name)}</span>
      <span class="h-time">${h.time}</span>
    </li>
  `).join('');
}
document.getElementById('clearHistoryBtn').addEventListener('click', () => {
  history = [];
  saveData();
  renderHistory();
});

// ===== Init =====
async function init() {
  loadData();
  // 无背景图时加载默认 JPG
  if (!bgImageData) {
    const defaultBg = await loadDefaultBg();
    if (defaultBg) {
      bgImageData = defaultBg;
      bgImgElement = new Image();
      bgImgElement.src = defaultBg;
      saveData();
    }
  }
  applyTheme();
  drawWheel();
  renderOptions();
  renderHistory();
  updateBgImage();
  document.getElementById('bgOpacity').value = bgOpacity;
  document.getElementById('bgBlur').value = bgBlur;
  document.getElementById('opacityVal').textContent = bgOpacity + '%';
  document.getElementById('blurVal').textContent = bgBlur + 'px';

  // Resize handler
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(drawWheel, 150);
  });
}

init();
</script>
